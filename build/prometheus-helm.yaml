apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  labels:
    app: prometheus-laf
  name: prometheus-laf
spec:
  podMetadata:
    labels:
      app: prometheus-laf
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  evaluationInterval: 60s
  image: quay.io/prometheus/prometheus:v2.45.0
  serviceMonitorSelector: {}
  probeSelector: {}
  ruleSelector: {}
  portName: http-web
  retention: 10d
  scrapeInterval: 60s
  serviceAccountName: ${{ defaults.app_name }}-sa
  replicas: 1
  shards: 1
  storage:
    volumeClaimTemplate:
      metadata:
        annotations:
          path: /prometheus
          value: " ${{ inputs.prometheus_storage }} "
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.prometheus_storage }}Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-laf
spec:
  ports:
    - port: 9090
      targetPort: http-web
      protocol: TCP
      name: http-web
  selector:
    app: prometheus-laf
  type: ClusterIP
